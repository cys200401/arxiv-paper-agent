# Daily pipeline: crawler | agent per user/topic, then POST results to Railway API.
# Secrets: GEMINI_API_KEY, API_HOST (e.g. https://xxx.up.railway.app), API_SECRET_KEY

name: Daily Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 daily
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - user_id: "user_1"
            topic: "cat:cs.AI"
          - user_id: "user_2"
            topic: "cat:cs.LG"
          - user_id: "user_3"
            topic: "all:reinforcement learning"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run crawler and agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python src/crawler.py --query "${{ matrix.topic }}" | python src/agent.py --interest "${{ matrix.topic }}" --model gemini-2.0-flash > report.json
          if [ ! -s report.json ]; then
            echo "Pipeline produced empty output"
            exit 1
          fi

      - name: Ingest to Railway API
        env:
          API_HOST: ${{ secrets.API_HOST }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
          RUNNER_USER_ID: ${{ matrix.user_id }}
          RUNNER_THEME: ${{ matrix.topic }}
        run: |
          python -c "
          import json, os
          with open('report.json') as f:
            report_data = json.load(f)
          payload = {
            'user_id': os.environ['RUNNER_USER_ID'],
            'theme': os.environ['RUNNER_THEME'],
            'report_data': report_data
          }
          with open('payload.json', 'w') as f:
            json.dump(payload, f, ensure_ascii=False)
          "
          curl -f -X POST "$API_HOST/api/v1/ingest" \
            -H "Authorization: Bearer $API_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json

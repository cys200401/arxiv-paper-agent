# Daily pipeline: crawler | agent per user/topic, then POST results to Railway API.
# Secrets: DASHSCOPE_API_KEY, API_HOST (e.g. https://xxx.up.railway.app), API_SECRET_KEY

name: Daily Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 daily
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - user_id: "user_1"
            topic: "cat:cs.AI"
          - user_id: "user_2"
            topic: "cat:cs.LG"
          - user_id: "user_3"
            topic: "all:reinforcement learning"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Check required secrets
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          if [ -z "$DASHSCOPE_API_KEY" ]; then
            echo "::error::DASHSCOPE_API_KEY secret is not set or empty. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run crawler and agent
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          python src/crawler.py --query "${{ matrix.topic }}" | python src/agent.py --interest "${{ matrix.topic }}" --model qwen-turbo > report.json
          if [ ! -s report.json ]; then
            echo "Pipeline produced empty output"
            exit 1
          fi

      - name: Health check API
        env:
          API_HOST: ${{ secrets.API_HOST }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf -o /dev/null "$API_HOST/health"; then
              echo "API is up"
              exit 0
            fi
            echo "Attempt $i/5: API not ready, retrying in 10s..."
            sleep 10
          done
          echo "::error::API unhealthy or not reachable; check API_HOST and Railway."
          exit 1

      - name: Ingest to Railway API
        env:
          API_HOST: ${{ secrets.API_HOST }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
          RUNNER_USER_ID: ${{ matrix.user_id }}
          RUNNER_THEME: ${{ matrix.topic }}
        run: |
          python -c "
          import json, os
          with open('report.json') as f:
            report_data = json.load(f)
          payload = {
            'user_id': os.environ['RUNNER_USER_ID'],
            'theme': os.environ['RUNNER_THEME'],
            'report_data': report_data
          }
          with open('payload.json', 'w') as f:
            json.dump(payload, f, ensure_ascii=False)
          "
          for attempt in 1 2 3; do
            curl -s -w "\n%{http_code}" -X POST "$API_HOST/api/v1/ingest" \
              -H "Authorization: Bearer $API_SECRET_KEY" \
              -H "Content-Type: application/json" \
              -d @payload.json -o response.txt
            code=$(tail -n1 response.txt)
            body=$(sed '$d' response.txt)
            if [ "$code" = "200" ]; then echo "Ingest succeeded"; exit 0; fi
            echo "Attempt $attempt failed: HTTP $code"
            echo "$body"
            [ $attempt -lt 3 ] && echo "Retrying in 5s..." && sleep 5
          done
          echo "::error::Ingest failed after 3 attempts. Last HTTP $code"
          exit 1

name: E2E Smoke

on:
  workflow_dispatch:  # 允许手动触发
    inputs:
      topic:
        description: 'Test topic'
        required: true
        default: 'machine learning'
        type: string

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest requests
      
      - name: Run Crawler
        env:
          PYTHONPATH: src
        run: |
          python -m src.cli.crawler --query "${{ github.event.inputs.topic }}" --target 5 --output papers.json
          echo "Crawler output:"
          head -c 1000 papers.json || echo "File not found or empty"
      
      - name: Run Agent
        env:
          PYTHONPATH: src
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -m src.cli.agent --input papers.json --output report.json
          echo "Agent output:"
          cat report.json
      
      - name: Ingest to API
        env:
          API_HOST: ${{ secrets.API_HOST }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        run: |
          echo "Ingesting to $API_HOST"
          curl -X POST "$API_HOST/ingest" \
            -H "Authorization: Bearer $API_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d @report.json \
            -v
      
      - name: Verify Data
        env:
          API_HOST: ${{ secrets.API_HOST }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        run: |
          echo "Verifying data in database..."
          curl -X GET "$API_HOST/reports?limit=1" \
            -H "Authorization: Bearer $API_SECRET_KEY" \
            -H "Content-Type: application/json" | python -m json.tool

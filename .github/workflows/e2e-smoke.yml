# E2E Smoke: manual run with topic input. Crawler -> Agent -> Ingest -> Verify.
# Secrets: DASHSCOPE_API_KEY, API_HOST, API_SECRET_KEY

name: E2E Smoke

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Test topic (e.g. machine learning, cat:cs.AI)'
        required: true
        default: 'machine learning'
        type: string

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest requests

      - name: Check required secrets
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          if [ -z "$DASHSCOPE_API_KEY" ]; then
            echo "::error::DASHSCOPE_API_KEY secret is not set or empty. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run Crawler
        env:
          PYTHONPATH: .
        run: |
          python -m src.cli.crawler --query "${{ github.event.inputs.topic }}" --target 5 --output papers.json
          echo "Crawler output:"
          head -c 1000 papers.json || echo "File not found or empty"

      - name: Run Agent
        env:
          PYTHONPATH: .
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          python -m src.cli.agent --input papers.json --output report.json --interest "${{ github.event.inputs.topic }}" --model qwen-turbo
          echo "Agent output:"
          head -c 500 report.json

      - name: Health check API
        env:
          API_HOST: ${{ secrets.API_HOST }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf -o /dev/null "$API_HOST/health"; then
              echo "API is up"
              exit 0
            fi
            echo "Attempt $i/5: API not ready, retrying in 10s..."
            sleep 10
          done
          echo "::error::API unhealthy or not reachable; check API_HOST and Railway."
          exit 1

      - name: Ingest to API
        env:
          API_HOST: ${{ secrets.API_HOST }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
          RUNNER_USER_ID: smoke_test
          RUNNER_THEME: ${{ github.event.inputs.topic }}
        run: |
          python -c "
          import json, os
          with open('report.json') as f:
            report_data = json.load(f)
          payload = {
            'user_id': os.environ['RUNNER_USER_ID'],
            'theme': os.environ['RUNNER_THEME'],
            'report_data': report_data
          }
          with open('payload.json', 'w') as f:
            json.dump(payload, f, ensure_ascii=False)
          "
          echo "Ingesting to $API_HOST"
          for attempt in 1 2 3; do
            code=$(curl -s -o response.txt -w "%{http_code}" -X POST "$API_HOST/api/v1/ingest" \
              -H "Authorization: Bearer $API_SECRET_KEY" \
              -H "Content-Type: application/json" \
              -d @payload.json)
            body=$(cat response.txt)
            if [ "$code" = "200" ]; then echo "Ingest succeeded"; exit 0; fi
            echo "Attempt $attempt failed: HTTP $code"
            echo "$body"
            [ $attempt -lt 3 ] && echo "Retrying in 5s..." && sleep 5
          done
          echo "::error::Ingest failed after 3 attempts. Last HTTP $code"
          exit 1

      - name: Verify Data
        env:
          API_HOST: ${{ secrets.API_HOST }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        run: |
          echo "Verifying data in database..."
          curl -s -X GET "$API_HOST/api/v1/reports?user_id=smoke_test&limit=1" \
            -H "Authorization: Bearer $API_SECRET_KEY" \
            -H "Content-Type: application/json" | python -m json.tool
